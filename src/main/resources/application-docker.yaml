# Docker profile configuration
# Activated when SPRING_PROFILES_ACTIVE=docker
# Overrides datasource to use Docker service name for connection

spring:
  datasource:
    url: jdbc:postgresql://db:5432/store
    username: admin
    password: admin
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        default_batch_fetch_size: 10
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
  endpoint:
    health:
      show-details: always